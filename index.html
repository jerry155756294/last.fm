<meta name="generator" content="Perplexity Computer">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Dashboard</title>
<meta name="description" content="個人 Last.fm 音樂聆聽儀表板 — 即時播放、歷史統計、視覺化分析">
<link rel="stylesheet" href="style.css">
<script src="runtime-config.js"></script>
<script src="api-key.js"></script>
</head>
<body>

<header class="top-bar">
  <div class="top-bar-logo">
    <svg class="icon icon-lg" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3" fill="currentColor" stroke="none"/><circle cx="18" cy="16" r="3" fill="currentColor" stroke="none"/></svg>
    <span>Scrobble Dashboard</span>
  </div>
  <div class="top-bar-spacer"></div>
  <div class="top-bar-user">
    <img id="user-avatar" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23ddd' width='32' height='32' rx='16'/></svg>" alt="avatar">
    <a id="username-display" href="#" target="_blank" rel="noopener noreferrer">—</a>
  </div>
  <button class="icon-btn" id="theme-toggle" aria-label="切換主題">
    <svg class="icon" id="icon-theme-light" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="icon" id="icon-theme-dark" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<div id="app" class="dashboard">
  <section class="now-playing" id="now-playing" aria-label="正在播放">
    <div class="np-bg" id="np-bg"></div>
    <div class="np-overlay"></div>
    <div class="np-content">
      <div class="np-art-wrap">
        <img class="np-art" id="np-art" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><rect fill='%23333' width='300' height='300'/><text x='150' y='160' text-anchor='middle' fill='%23666' font-size='36'>♪</text></svg>" alt="Album Art">
      </div>
      <div class="np-info">
        <div class="np-badge np-badge-idle" id="np-badge">
          <span>等待資料...</span>
        </div>
        <h1 class="np-title" id="np-title">—</h1>
        <p class="np-artist" id="np-artist">—</p>
        <p class="np-album" id="np-album"></p>
        <p class="np-time-ago" id="np-time-ago"></p>
      </div>
    </div>
  </section>

  <section class="stats-row" id="stats-cards" aria-label="統計概覽">
    <div class="stat-card"><span class="stat-value">—</span><span class="stat-label">Scrobbles</span></div>
    <div class="stat-card"><span class="stat-value">—</span><span class="stat-label">藝人</span></div>
    <div class="stat-card"><span class="stat-value">—</span><span class="stat-label">專輯</span></div>
    <div class="stat-card"><span class="stat-value">—</span><span class="stat-label">曲目</span></div>
    <div class="stat-card"><span class="stat-value stat-value-sm">—</span><span class="stat-label">加入日期</span></div>
  </section>

  <section class="card card-elevated" aria-label="最近播放">
    <div class="card-title">
      <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      最近播放
    </div>
    <div class="list-container" id="recent-tracks-list">
      <p class="muted">載入中...</p>
    </div>
  </section>

  <section aria-label="排行榜">
    <div class="chip-row" id="period-chips">
      <button class="chip active" data-period="7day">7 天</button>
      <button class="chip" data-period="1month">1 個月</button>
      <button class="chip" data-period="3month">3 個月</button>
      <button class="chip" data-period="6month">6 個月</button>
      <button class="chip" data-period="12month">12 個月</button>
      <button class="chip" data-period="overall">全部</button>
    </div>
    <div class="grid-3">
      <div class="card card-elevated">
        <div class="card-title">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          熱門藝人
        </div>
        <div class="list-container" id="top-artists"><p class="muted">載入中...</p></div>
      </div>
      <div class="card card-elevated">
        <div class="card-title">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          熱門專輯
        </div>
        <div class="list-container" id="top-albums"><p class="muted">載入中...</p></div>
      </div>
      <div class="card card-elevated">
        <div class="card-title">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          熱門曲目
        </div>
        <div class="list-container" id="top-tracks"><p class="muted">載入中...</p></div>
      </div>
    </div>
  </section>

  <div class="grid-2">
    <section class="card card-elevated" aria-label="Scrobble 熱力圖">
      <div class="card-title">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Scrobble 熱力圖
      </div>
      <div class="heatmap-wrap" id="heatmap"><p class="muted">需要本地資料檔</p></div>
    </section>

    <section class="card card-elevated" aria-label="聆聽時鐘">
      <div class="card-title">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        24 小時聆聽分佈
      </div>
      <div class="clock-wrap">
        <canvas id="listening-clock" width="280" height="280"></canvas>
      </div>
    </section>
  </div>

  <div class="grid-2">
    <section class="card card-elevated" aria-label="月度趨勢">
      <div class="card-title">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        月度 Scrobble 趨勢
      </div>
      <div class="chart-wrap">
        <canvas id="monthly-trend"></canvas>
      </div>
    </section>

    <section class="card card-elevated" aria-label="音樂風格">
      <div class="card-title">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        曲風標籤
      </div>
      <div class="tag-cloud" id="tag-cloud"><p class="muted">載入中...</p></div>
    </section>
  </div>

  <section class="card" aria-label="資料檔管理">
    <div class="card-title">
      <svg class="icon icon-sm" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      本地資料檔
    </div>
    <div class="data-bar">
      <span class="cache-badge" id="cache-count">0 筆資料</span>
      <span class="cache-badge" id="data-updated">尚未載入</span>
      <span class="cache-badge" id="live-status">最近播放未更新</span>
      <button class="btn-md3" id="btn-refresh">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.13 3.36L1 14"/></svg>
        立即重新抓取
      </button>
      <button class="btn-md3" id="btn-export">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        匯出合併 JSON
      </button>
    </div>
  </section>
</div>

<footer class="footer">
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>

<script src="fetch-lastfm.js"></script>
<script src="cache-control.js"></script>
<script src="render-ui.js"></script>

</body>
</html>
